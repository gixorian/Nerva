name: app-health-checker

services:
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api

  api:
    build: .
    deploy:
      replicas: 3
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    environment:
      - PYTHONBUFFERED=1
      - CHECK_PATH=/app
      - REDIS_HOST=redis-db
    user: "${USER_ID:-1000}:${GROUP_ID:-1000}"
    depends_on:
      - redis-db

  redis-db:
    image: redis:8-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data

volumes:
  redis_data:
